<!DOCTYPE html>
<html lang="id">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AURA - AI Personal Assistant untuk manajemen tugas dan keuangan pribadi Anda.">
  <meta name="theme-color" content="#7C3AED">

  <!-- PWA meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AURA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>AURA — AI Personal Assistant</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0F;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .logo {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7C3AED, #06B6D4);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      box-shadow: 0 0 40px rgba(124,58,237,0.5);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 30px rgba(124,58,237,0.4); } 50% { box-shadow: 0 0 60px rgba(124,58,237,0.8); } }
    .title {
      font-size: 28px; font-weight: 800; letter-spacing: 6px;
      background: linear-gradient(135deg, #7C3AED, #06B6D4);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { font-size: 13px; color: #6B6B8A; letter-spacing: 2px; }
    .spinner {
      width: 120px; height: 3px;
      background: #1A1A27; border-radius: 2px; overflow: hidden;
    }
    .spinner-bar {
      height: 100%; width: 40%;
      background: linear-gradient(90deg, #7C3AED, #06B6D4);
      border-radius: 2px;
      animation: slide 1.5s ease-in-out infinite;
    }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">✨</div>
    <div class="title">AURA</div>
    <div class="subtitle">AI Personal Assistant</div>
    <div class="spinner"><div class="spinner-bar"></div></div>
  </div>

  <script>
    // Hide loading screen when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.transition = 'opacity 0.3s ease';
        loading.style.opacity = '0';
        setTimeout(function() { loading.remove(); }, 300);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
