name: aura_mobile
description: "AURA - AI Personal Assistant for Task & Finance Management"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0
  lottie: ^3.3.3
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^17.2.3

  # Backend - PocketBase
  pocketbase: ^0.23.3
  http: ^1.2.2
  http_parser: ^4.1.2

  # HTTP Client
  dio: ^5.9.2

  # Local Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.2.0

  # Charts
  fl_chart: ^1.2.0

  # Date/Time & Formatting
  intl: ^0.20.2

  # Utilities
  uuid: ^4.5.3
  equatable: ^2.0.8
  logger: ^2.7.0

  # Local Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Connectivity
  connectivity_plus: ^7.1.1

  # Image Picker
  image_picker: ^1.2.2

  # URL Launcher
  url_launcher: ^6.3.2

  # Loading / Overlay
  flutter_spinkit: ^5.2.2
  flutter_image_compress: ^2.4.0
  image_cropper: ^12.2.1
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env
